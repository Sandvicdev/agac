<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=2.0, minimum-scale=0.5">
    <title>Ağaç · Araba Çarpınca Video</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background: #1a3c1a;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            touch-action: manipulation;
        }

        /* Ana oyun alanı */
        #agac-alani {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at 20% 30%, #2d5a2d, #0f2b0f);
            overflow: hidden;
        }

        /* Yol - alt kısımda */
        .yol {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 22%;
            background: #333;
            background: linear-gradient(to bottom, #555, #222);
            box-shadow: inset 0 8px 15px rgba(0,0,0,0.7);
            z-index: 5;
        }

        /* Yol çizgileri */
        .yol-cizgi {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 6px;
            background: repeating-linear-gradient(90deg, #ffdd00 0px, #ffdd00 40px, transparent 40px, transparent 80px);
            transform: translateY(-50%);
            z-index: 6;
        }

        /* Kaldırım */
        .kaldirim {
            position: absolute;
            bottom: 22%;
            left: 0;
            width: 100%;
            height: 15px;
            background: #999;
            background: linear-gradient(to bottom, #bbb, #777);
            z-index: 6;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.5);
        }

        /* Ağaç konteyneri - yolun üstünde */
        .agac-konteyner {
            position: absolute;
            bottom: calc(22% + 15px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .agac-konteyner.sallan {
            animation: sallanma 0.6s ease-out;
        }

        @keyframes sallanma {
            0% { transform: translateX(-50%) rotate(0deg); }
            15% { transform: translateX(-50%) rotate(-8deg); }
            30% { transform: translateX(-50%) rotate(6deg); }
            45% { transform: translateX(-50%) rotate(-5deg); }
            60% { transform: translateX(-50%) rotate(3deg); }
            75% { transform: translateX(-50%) rotate(-2deg); }
            90% { transform: translateX(-50%) rotate(1deg); }
            100% { transform: translateX(-50%) rotate(0deg); }
        }

        /* Ağaç gövdesi + yapraklar */
        .agac-butun {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.5));
        }

        .yapraklar {
            position: relative;
            width: 180px;
            height: 160px;
            background: radial-gradient(ellipse at 40% 30%, #4caf50, #1b4d1b);
            border-radius: 50% 50% 45% 45%;
            box-shadow: inset 0 -10px 20px rgba(0, 0, 0, 0.4), 0 15px 25px rgba(0, 0, 0, 0.5);
            border-bottom: 6px solid #3e6b3e;
        }

        .yapraklar::before {
            content: "";
            position: absolute;
            width: 70px;
            height: 70px;
            background: #3c823c;
            border-radius: 50%;
            top: -20px;
            left: 20px;
            box-shadow: 0 0 15px #2d5a2d;
            opacity: 0.9;
        }

        .yapraklar::after {
            content: "";
            position: absolute;
            width: 85px;
            height: 85px;
            background: #357935;
            border-radius: 50%;
            top: -25px;
            right: 10px;
            box-shadow: 0 0 15px #1f471f;
            opacity: 0.85;
        }

        .ekstra-yaprak {
            position: absolute;
            width: 95px;
            height: 95px;
            background: radial-gradient(circle at 30% 30%, #56b456, #215321);
            border-radius: 50%;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 18px #2b542b;
        }

        .govde {
            width: 55px;
            height: 130px;
            background: linear-gradient(to right, #5d3a1a, #8b5a2b, #5d3a1a);
            border-radius: 10px 10px 20px 20px;
            margin-top: -15px;
            box-shadow: inset 3px 0 8px rgba(0,0,0,0.5), inset -3px 0 8px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
        }

        .govde::after {
            content: "";
            position: absolute;
            bottom: -15px;
            left: -18px;
            width: 90px;
            height: 25px;
            background: radial-gradient(ellipse at center, #6b4f2b, #3b2a14);
            border-radius: 50%;
            z-index: -1;
        }

        /* Araba */
        .araba {
            position: absolute;
            bottom: calc(22% + 20px);
            left: -200px;
            z-index: 15;
            transition: none;
            pointer-events: none;
        }

        .araba.hareket-et {
            animation: arabaGeliyor 2.5s cubic-bezier(0.25, 0.1, 0.15, 1) forwards;
        }

        @keyframes arabaGeliyor {
            0% {
                left: -250px;
                transform: scale(1);
            }
            70% {
                left: calc(50% - 90px);
                transform: scale(1);
            }
            85% {
                left: calc(50% - 60px);
                transform: scale(0.95);
            }
            100% {
                left: calc(50% - 40px);
                transform: scale(0.9);
            }
        }

        /* Araba gövdesi */
        .araba-govde {
            position: relative;
            width: 160px;
            height: 55px;
            background: linear-gradient(to bottom, #e74c3c, #c0392b);
            border-radius: 8px 8px 4px 4px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        /* Araba üst kabin */
        .araba-kabin {
            position: absolute;
            top: -28px;
            left: 30px;
            width: 80px;
            height: 35px;
            background: linear-gradient(to bottom, #ff6b6b, #d63031);
            border-radius: 15px 15px 0 0;
            box-shadow: inset 0 5px 10px rgba(255,255,255,0.3);
        }

        /* Camlar */
        .araba-kabin::before {
            content: "";
            position: absolute;
            top: 5px;
            left: 8px;
            width: 25px;
            height: 22px;
            background: #a0d8ef;
            border-radius: 5px;
            opacity: 0.7;
        }

        .araba-kabin::after {
            content: "";
            position: absolute;
            top: 5px;
            right: 8px;
            width: 25px;
            height: 22px;
            background: #a0d8ef;
            border-radius: 5px;
            opacity: 0.7;
        }

        /* Farlar */
        .far-on {
            position: absolute;
            top: 10px;
            right: -5px;
            width: 12px;
            height: 10px;
            background: #ffeaa7;
            border-radius: 50%;
            box-shadow: 0 0 10px #ffeaa7;
        }

        .far-arka {
            position: absolute;
            top: 10px;
            left: -5px;
            width: 8px;
            height: 8px;
            background: #ff7675;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff7675;
        }

        /* Tekerlekler */
        .tekerlek {
            position: absolute;
            bottom: -12px;
            width: 25px;
            height: 25px;
            background: #222;
            border-radius: 50%;
            box-shadow: inset 0 0 8px rgba(0,0,0,0.8), 0 4px 8px rgba(0,0,0,0.6);
            border: 3px solid #555;
        }

        .tekerlek.on {
            right: 15px;
        }

        .tekerlek.arka {
            left: 15px;
        }

        /* Toz efekti */
        .toz-bulutu {
            position: absolute;
            bottom: calc(22% + 10px);
            left: 50%;
            transform: translateX(-50%);
            z-index: 14;
            pointer-events: none;
            opacity: 0;
        }

        .toz-bulutu.aktif {
            animation: tozKalkisi 1s ease-out forwards;
        }

        @keyframes tozKalkisi {
            0% {
                opacity: 0;
                transform: translateX(-50%) scale(0.5);
            }
            30% {
                opacity: 1;
                transform: translateX(-50%) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateX(-50%) scale(2.5) translateY(-30px);
            }
        }

        .toz-parcacik {
            display: inline-block;
            width: 20px;
            height: 20px;
            background: #c9a96e;
            border-radius: 50%;
            margin: 3px;
            box-shadow: 0 0 10px #b8956a;
        }

        /* Yazı */
        .talimat {
            position: absolute;
            top: 8%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.75);
            color: #f0e68c;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            white-space: nowrap;
            border: 1px solid #b5944c;
            pointer-events: none;
            z-index: 20;
        }

        /* Buton */
        .baslat-btn {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, #f39c12, #e67e22);
            color: white;
            padding: 14px 35px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
            box-shadow: 0 8px 0 #b5600c, 0 10px 20px rgba(0,0,0,0.4);
            z-index: 25;
            letter-spacing: 1px;
            transition: all 0.08s ease;
        }

        .baslat-btn:active {
            transform: translateX(-50%) translateY(4px);
            box-shadow: 0 4px 0 #b5600c, 0 8px 15px rgba(0,0,0,0.5);
        }

        /* Video konteyneri */
        .video-konteyner {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .video-konteyner.aktif {
            display: flex;
        }

        video {
            max-width: 95%;
            max-height: 75vh;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(255, 100, 0, 0.7);
            background: #000;
        }

        .kapat-btn {
            margin-top: 25px;
            background: linear-gradient(to bottom, #e74c3c, #a8231a);
            border: none;
            color: white;
            font-size: 1.3rem;
            font-weight: bold;
            padding: 14px 35px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #641e16, 0 10px 20px rgba(0,0,0,0.5);
            letter-spacing: 1px;
            border: 1px solid #ffb5a0;
            transition: all 0.08s ease;
        }

        .kapat-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #641e16, 0 8px 15px rgba(0,0,0,0.6);
        }

        @media (max-width: 500px) {
            .yapraklar {
                width: 140px;
                height: 130px;
            }
            .govde {
                width: 45px;
                height: 110px;
            }
            .araba-govde {
                width: 130px;
                height: 45px;
            }
            .araba-kabin {
                width: 65px;
                height: 28px;
                top: -22px;
                left: 25px;
            }
            .talimat {
                font-size: 1rem;
                padding: 8px 20px;
            }
            .baslat-btn {
                font-size: 1.1rem;
                padding: 12px 28px;
            }
        }
    </style>
</head>
<body>
    <!-- Ana alan -->
    <div id="agac-alani">
        <!-- Yol -->
        <div class="yol">
            <div class="yol-cizgi"></div>
        </div>
        <div class="kaldirim"></div>

        <!-- Ağaç -->
        <div class="agac-konteyner" id="agacKonteyner">
            <div class="agac-butun">
                <div class="yapraklar">
                    <div class="ekstra-yaprak"></div>
                </div>
                <div class="govde"></div>
            </div>
        </div>

        <!-- Araba -->
        <div class="araba" id="araba">
            <div class="araba-govde">
                <div class="araba-kabin"></div>
                <div class="far-on"></div>
                <div class="far-arka"></div>
                <div class="tekerlek on"></div>
                <div class="tekerlek arka"></div>
            </div>
        </div>

        <!-- Toz efekti -->
        <div class="toz-bulutu" id="tozBulutu">
            <span class="toz-parcacik"></span>
            <span class="toz-parcacik"></span>
            <span class="toz-parcacik"></span>
            <span class="toz-parcacik"></span>
        </div>

        <!-- Yazı -->
        <div class="talimat">🚗 Butona bas, araba ağaca çarpsın!</div>
        <button class="baslat-btn" id="baslatBtn">▶ Animasyonu Başlat</button>
    </div>

    <!-- Video popup -->
    <div class="video-konteyner" id="videoKonteyner">
        <video id="agacVideosu" controls playsinline>
            <source src="/sa.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
        <button class="kapat-btn" id="kapatVideoBtn">✕ Videoyu Kapat</button>
    </div>

    <script>
        (function() {
            "use strict";

            const agacKonteyner = document.getElementById('agacKonteyner');
            const araba = document.getElementById('araba');
            const baslatBtn = document.getElementById('baslatBtn');
            const tozBulutu = document.getElementById('tozBulutu');
            const videoKonteyner = document.getElementById('videoKonteyner');
            const videoElement = document.getElementById('agacVideosu');
            const kapatBtn = document.getElementById('kapatVideoBtn');
            const agacAlan = document.getElementById('agac-alani');

            let animasyonDevamEdiyor = false;

            function videoyuAc() {
                videoKonteyner.classList.add('aktif');
                videoElement.currentTime = 0;
                const playPromise = videoElement.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.warn("Video otomatik oynatılamadı:", error);
                    });
                }
            }

            function videoyuKapat() {
                videoElement.pause();
                videoKonteyner.classList.remove('aktif');
                console.log("Video kapatıldı.");
            }

            function animasyonuBaslat() {
                if (animasyonDevamEdiyor) return;
                animasyonDevamEdiyor = true;
                baslatBtn.disabled = true;
                baslatBtn.style.opacity = "0.6";
                baslatBtn.style.pointerEvents = "none";

                // Arabayı sıfırla
                araba.classList.remove('hareket-et');
                agacKonteyner.classList.remove('sallan');
                tozBulutu.classList.remove('aktif');

                // Reflow zorla
                void araba.offsetWidth;
                void agacKonteyner.offsetWidth;

                // Arabayı hareket ettir
                araba.classList.add('hareket-et');

                // Çarpma anı: animasyonun %85'inde (2.5s * 0.85 ≈ 2.125s)
                setTimeout(() => {
                    // Ağaç sallansın
                    agacKonteyner.classList.add('sallan');
                    
                    // Toz efekti
                    tozBulutu.classList.add('aktif');
                    
                    // Titreşim efekti (ekran sallanması)
                    document.body.style.transform = 'translateX(3px)';
                    setTimeout(() => {
                        document.body.style.transform = 'translateX(-3px)';
                    }, 50);
                    setTimeout(() => {
                        document.body.style.transform = 'translateX(2px)';
                    }, 100);
                    setTimeout(() => {
                        document.body.style.transform = 'translateX(0)';
                    }, 150);

                    // Video açılsın (çarpma anından biraz sonra)
                    setTimeout(() => {
                        videoyuAc();
                    }, 400);

                }, 2125);

                // Animasyon bitince resetle (2.5s + biraz pay)
                setTimeout(() => {
                    animasyonDevamEdiyor = false;
                    baslatBtn.disabled = false;
                    baslatBtn.style.opacity = "1";
                    baslatBtn.style.pointerEvents = "auto";
                    
                    // Arabayı yavaşça geri al (opsiyonel: hemen kaybolsun)
                    setTimeout(() => {
                        araba.classList.remove('hareket-et');
                        agacKonteyner.classList.remove('sallan');
                        tozBulutu.classList.remove('aktif');
                    }, 600);
                }, 3200);
            }

            // Butona tıkla
            baslatBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                animasyonuBaslat();
            });

            // Ağaca tıklayınca da animasyon başlasın (alternatif)
            agacKonteyner.addEventListener('click', (e) => {
                e.stopPropagation();
                if (!animasyonDevamEdiyor) {
                    animasyonuBaslat();
                }
            });

            // Video kapatma
            kapatBtn.addEventListener('click', (e) => {
                e.stopPropagation();
                videoyuKapat();
            });

            videoKonteyner.addEventListener('click', (e) => {
                if (e.target === videoKonteyner) {
                    videoyuKapat();
                }
            });

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && videoKonteyner.classList.contains('aktif')) {
                    videoyuKapat();
                }
            });

            // Klavyeden boşluk tuşuyla da animasyon başlat
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' && !videoKonteyner.classList.contains('aktif') && !animasyonDevamEdiyor) {
                    e.preventDefault();
                    animasyonuBaslat();
                }
            });

            console.log("🚗🌳 Animasyon hazır! Butona bas veya ağaca tıkla, araba gelsin çarpsın!");
        })();
    </script>
</body>
</html>
